<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Strategy</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #eee; text-align: center; margin: 0; padding: 20px; }
        .setup-panel { background: #2a2a2a; padding: 30px; border-radius: 12px; border: 2px solid #444; display: inline-block; margin-top: 50px; max-width: 500px; }
        input { display: block; margin: 20px auto; padding: 12px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; width: 80%; font-size: 16px; }
        button { padding: 12px 24px; background: #4caf50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #45a049; }
        .hidden { display: none; }
        .leader-gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; }
        .leader-opt { width: 100px; height: 100px; border: 4px solid transparent; border-radius: 50%; cursor: pointer; overflow: hidden; transition: 0.2s; background: #333;}
        .leader-opt img { width: 100%; height: 100%; object-fit: cover; }
        .leader-opt.selected { border-color: #4caf50; transform: scale(1.1); box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #eee; object-fit: cover; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loading">📡 Установка связи с Кремлем/Белым домом...</div>

    <div id="creation-form" class="setup-panel hidden">
        <h2>Основание Державы</h2>
        <input type="text" id="country-name" placeholder="Название вашей страны" maxlength="25">
        <p>Выберите облик правителя:</p>
        <div class="leader-gallery" id="leader-selector">
            <div class="leader-opt" data-leader="trump"><img src="leaders/trump.jpg" alt="Trump"></div>
            <div class="leader-opt" data-leader="putin"><img src="leaders/putin.jpg" alt="Putin"></div>
            <div class="leader-opt" data-leader="netanyahu"><img src="leaders/netanyahu.jpg" alt="Netanyahu"></div>
            <div class="leader-opt" data-leader="custom"><img src="leaders/custom.jpg" alt="Leader"></div>
        </div>
        <button id="start-btn">Утвердить власть</button>
    </div>

    <div id="game-panel" class="setup-panel hidden">
        <img src="" id="display-avatar" class="profile-avatar">
        <h1 id="display-country">Страна</h1>
        <div style="text-align: left; background: #222; padding: 15px; border-radius: 8px;">
            <p>💰 Золото: <b id="display-gold">0</b></p>
            <p>⚔️ Армия: <b id="display-army">0</b> чел.</p>
        </div>
        <br>
        <button onclick="alert('Строительство начато. Вернитесь через пару часов!')" style="background: #2196F3;">Построить Казарму</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ТВОИ ДАННЫЕ ВСТАВЛЕНЫ СЮДА:
        const firebaseConfig = {
            apiKey: "AIzaSyAxNVY5ys6a6RnavEK1QoTUonTGe4qhrMc",
            authDomain: "super-strategy.firebaseapp.com",
            projectId: "super-strategy",
            storageBucket: "super-strategy.firebasestorage.app",
            messagingSenderId: "686354557279",
            appId: "1:686354557279:web:4b56693c307718c4d86eea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let selectedLeaderId = null;

        const selector = document.getElementById('leader-selector');
        selector.onclick = (e) => {
            const opt = e.target.closest('.leader-opt');
            if (!opt) return;
            document.querySelectorAll('.leader-opt').forEach(el => el.classList.remove('selected'));
            opt.classList.add('selected');
            selectedLeaderId = opt.dataset.leader;
        };

        signInAnonymously(auth).catch(err => console.error(err));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loading').classList.add('hidden');
                const docSnap = await getDoc(doc(db, "countries", user.uid));
                if (docSnap.exists()) {
                    showGame(docSnap.data());
                } else {
                    document.getElementById('creation-form').classList.remove('hidden');
                }
            }
        });

        document.getElementById('start-btn').onclick = async () => {
            const name = document.getElementById('country-name').value.trim();
            if(!name || !selectedLeaderId) return alert("Выбери имя и лицо правителя!");
            const data = { name, leaderImgId: selectedLeaderId, gold: 1000, army: 50 };
            await setDoc(doc(db, "countries", currentUser.uid), data);
            showGame(data);
        };

        function showGame(data) {
            document.getElementById('creation-form').classList.add('hidden');
            document.getElementById('game-panel').classList.remove('hidden');
            document.getElementById('display-country').innerText = data.name;
            document.getElementById('display-gold').innerText = data.gold;
            document.getElementById('display-army').innerText = data.army;
            document.getElementById('display-avatar').src = `leaders/${data.leaderImgId}.jpg`;
        }
    </script>
</body>
</html>
